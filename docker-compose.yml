# GASQ Laravel — local development only. Not for production.
# Tables/columns match Supabase schema (MySQL).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gasq-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8082:8080"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8082
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=gasq
      - DB_USERNAME=gasq
      - DB_PASSWORD=secret
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: gasq-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gasq
      MYSQL_USER: gasq
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33060:3306"
    volumes:
      - gasq-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: gasq-phpmyadmin
    restart: unless-stopped
    ports:
      - "8083:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy

volumes:
  gasq-mysql-data:
